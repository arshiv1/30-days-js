
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator-wrapper">
        <div class="viewing-mode-div">
            <button class="lightmode-btn">☀️</button>
            <button class="darkmode-btn">🌙</button>
        </div>

        <div class="input-div">

            <input type="text" class="input-field">
            <div class="output-div"></div>

        </div>

        <div class="buttons-div">
            <button class="buttons clear text-green">AC</button>
            <button class="buttons toggle text-green">+/-</button>
            <button class="buttons operator text-green">%</button>
            <button class="buttons operator text-red">÷</button>

            <button class="buttons number">7</button>
            <button class="buttons number">8</button>
            <button class="buttons number">9</button>
            <button class="buttons operator text-red">*</button>

            <button class="buttons number">4</button>
            <button class="buttons number">5</button>
            <button class="buttons number">6</button>
            <button class="buttons operator text-red">-</button>

            <button class="buttons number">1</button>
            <button class="buttons number">2</button>
            <button class="buttons number">3</button>
            <button class="buttons operator text-red">+</button>

            <button class="buttons delete">↺</button>
            <button class="buttons number">0</button>
            <button class="buttons number">.</button>
            <button class="buttons equals text-green">=</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
